<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Somando numero</title>
    <style>
        body{
            font: normal 18pt arial;
        }
        input{
            font: normal 18pt arial;
            width: 100px;
        }
        div#res{
            border: 20px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Somando valores</h1>
    <input type="number" name='tst1' id="txt1">
    <input type="number" name="txt2" id="txt2">
    <input type="button" value="Somar" onclick="somar()">
    <div id="res">Resultado</div>
    <script>
        function somar(){
            const tx1 = document.getElementById('txt1')
            const tx2 = document.querySelector('input#txt2')
            const result = document.getElementById('res')
            const tn1 = Number(tx1.value)
            const tn2 = Number(tx2.value)
            const s = tn1 + tn2
            result.innerText = `A soma entre ${tn1} e ${tn2} é igual a ${s}`

            
        }
    </script>

</body>
</html>
