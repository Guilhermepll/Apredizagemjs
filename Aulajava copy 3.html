<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu primeiro programa</title>
    <style>
        /* Aqui é meio que quase um exemplo de css, onde damos cor e vida a pagina*/
        body {
            background-color: rgb(57, 145, 97);
            color: rgb(0, 0, 0);
            font: normal 20pt arial
    </style>
</head>
<body>
    <h1>Ola mundooo</h1>
    <P> É um grande prazer te-lo aqui conosco!! </P>
    <script>
        /*Aqui nós abrimos o js para que o programa funcione*/
        /* o number que usamos antes do window serve para converter a minha 'string' em numero*/
        const n1 = Number(window.prompt('Digite um número:')) /*serve para introduzir alguma informação*/
        const n2 = Number(window.prompt('Digite outro numero: '))
        const sm = n1 + n2
        window.alert(`A soma dos numeros ${n1} e ${n2} são ${sm}`)
        // O + pode servir tanto para adição quanto para concatenação
        // (number + number serve para adição)
        // ( string + string serve para concatenação)
        
    </script>
</body>

</html>
